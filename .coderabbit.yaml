# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
reviews:
  profile: "assertive"
  request_reviews_from_completions: true
  auto_review:
    enabled: true
    draft: false
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/pnpm-lock.yaml"
chat:
  enabled: true
instructions:
  - "Focus on microservices architectural patterns (decoupling, resilience, observability)."
  - "Ensure all API interactions use the established Correlation ID pattern."
  - "Validate that security middlewares are correctly applied to all Gateway routes."
  - "Check for premium UI/UX standards in the Next.js frontend (glassmorphism, animations)."
  - "Verify that database operations in microservices use local models and don't leak shared state."
